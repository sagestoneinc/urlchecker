name: Hubstaff Tasks Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hubstaff-task-bot
  cancel-in-progress: true
jobs:
  task-bot:
    runs-on: ubuntu-latest
    env:
      HUBSTAFF_TOKEN: ${{ secrets.HUBSTAFF_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Hubstaff task bot once
        if: ${{ env.HUBSTAFF_TOKEN != '' && env.TELEGRAM_BOT_TOKEN != '' }}
        env:
          ENABLE_HUBSTAFF_TASKS_BOT: "true"
          TASKBOT_USER_MAPPING_JSON: ${{ secrets.TASKBOT_USER_MAPPING_JSON }}
        run: python bot_entrypoint.py --run-once
